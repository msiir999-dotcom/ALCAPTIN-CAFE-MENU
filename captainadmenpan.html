<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>COFFEE ALCAPTAIN | لوحة الكابتن</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    :root { --bg: #F6F2E8; --navy: #132A49; --gold: #C5A880; --gold-dk: #A68B65; --white: #FFFFFF; --card: #FFFFFF; --danger: #C0392B; --success: #1E8449; --radius: 12px; --shadow: 0 8px 24px rgba(19,42,73,0.10); }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { background: var(--bg); font-family: "Noto Sans Arabic", sans-serif; color: var(--navy); min-height: 100vh; padding-bottom: 60px; }
    h1, h2, h3, .brand-name { font-family:"El Messiri",sans-serif; }
    .top-bar { background: var(--navy); padding: 18px 20px; display: flex; align-items: center; justify-content: center; gap: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.25); position: relative; }
    .brand-name { font-size: 24px; color: var(--gold); }
    .captain-badge { background: var(--gold); color: var(--navy); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .login-container { display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .login-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); width: 100%; max-width: 400px; padding: 24px; text-align: center; }
    #mainDashboard { display: none; }
    .tabs-row { display: flex; margin: 20px 16px 0; border-radius: var(--radius); overflow: hidden; border: 1.5px solid var(--gold); }
    .tab { flex: 1; padding: 13px 10px; text-align: center; font-weight: 700; cursor: pointer; background: var(--white); color: var(--navy); font-family: "El Messiri", sans-serif; }
    .tab.active { background: var(--navy); color: var(--gold); }
    .tab-content { display:none; padding:16px; }
    .tab-content.active { display:block; }
    .section-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--navy); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 7px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: "Noto Sans Arabic", sans-serif; }
    .btn-gold { background:var(--gold); color:var(--navy); }
    .btn-navy { background:var(--navy); color:var(--gold); }
    .btn-danger { background:var(--danger); color:var(--white); }
    .item-row { display: flex; align-items: center; gap: 8px; padding: 11px 12px; background: var(--bg); border-radius: 9px; margin-bottom: 9px; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(19,42,73,0.65); z-index: 900; align-items: center; justify-content: center; padding: 20px; }
    .overlay.open { display:flex; }
    .modal { background: var(--white); border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; }
    .form-group { margin-bottom:14px; text-align: right; }
    .form-group input, .form-group select { width:100%; padding:11px 12px; border:1.5px solid rgba(19,42,73,0.15); border-radius:9px; background:var(--bg); outline:none; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--navy); color:var(--gold); padding:12px 24px; border-radius:30px; font-weight:700; z-index:9999; transition:transform .35s; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .loading { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--gold); }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="brand-name">ALCAPTAIN CAFE</span>
    <span class="captain-badge">الكابتن</span>
  </div>

  <div class="login-container" id="loginWrapper">
    <div class="login-card">
      <h2>🔐 تسجيل دخول الكابتن</h2>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="captain@cafe.com">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn btn-navy" style="width:100%; padding:12px; font-size:15px;" onclick="handleLogin()">تسجيل الدخول</button>
    </div>
  </div>

  <div id="mainDashboard">
    <div class="tabs-row">
      <div class="tab active" id="tabCats" onclick="switchTab('cats')">📂 الأقسام</div>
      <div class="tab" id="tabItems" onclick="switchTab('items')">🍽️ الأصناف</div>
    </div>
    <div class="tab-content active" id="contentCats">
      <div style="display:flex; justify-content:center; margin:15px 0;"><button class="btn btn-navy" onclick="openCatModal()">➕ إضافة قسم</button></div>
      <div id="catsList"><div class="loading">جاري التحميل...</div></div>
    </div>
    <div class="tab-content" id="contentItems">
      <div style="display:flex; justify-content:center; margin:15px 0;"><button class="btn btn-navy" onclick="openItemModal()">➕ إضافة صنف</button></div>
      <div id="itemsList"><div class="loading">جاري التحميل...</div></div>
    </div>
    <div style="text-align: center; margin-top: 20px;"><button class="btn btn-danger" onclick="handleLogout()">🚪 تسجيل الخروج</button></div>
  </div>

  <div class="overlay" id="catOverlay"><div class="modal"><h3>📂 قسم جديد</h3><input type="hidden" id="catEditKey"><div class="form-group"><label>الاسم بالعربي</label><input type="text" id="catArInput"></div><div class="form-group"><label>الاسم بالإنكليزي</label><input type="text" id="catEnInput"></div><button class="btn btn-gold" onclick="saveCat()">حفظ</button><button class="btn btn-navy" onclick="closeCatModal()">إلغاء</button></div></div>
  <div class="overlay" id="itemOverlay"><div class="modal"><h3>🍽️ صنف جديد</h3><input type="hidden" id="itemEditKey"><div class="form-group"><label>الاسم بالإنكليزي</label><input type="text" id="itemEnInput"></div><div class="form-group"><label>الاسم بالعربي</label><input type="text" id="itemArInput"></div><div class="form-group"><label>السعر</label><input type="number" id="itemPriceInput"></div><div class="form-group"><label>القسم</label><select id="itemCatSelect"><option value="">-- اختر القسم --</option></select></div><button class="btn btn-gold" onclick="saveItem()">حفظ</button><button class="btn btn-navy" onclick="closeItemModal()">إلغاء</button></div></div>
  <div class="toast" id="toast"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyClB_1NEbHb6QACxGQr59hXnUNrjN32UXE",
      authDomain: "cofe1-6d9c5.firebaseapp.com",
      databaseURL: "https://cofe1-6d9c5-default-rtdb.firebaseio.com/",
      projectId: "cofe1-6d9c5",
      storageBucket: "cofe1-6d9c5.appspot.com",
      appId: "1:721091484285:web:edba55e2d681c2ebefef14"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    auth.onAuthStateChanged(user => {
      document.getElementById('loginWrapper').style.display = user ? 'none' : 'flex';
      document.getElementById('mainDashboard').style.display = user ? 'block' : 'none';
      if(user) loadData();
    });

    function handleLogin() {
      const e = document.getElementById('loginEmail').value;
      const p = document.getElementById('loginPassword').value;
      auth.signInWithEmailAndPassword(e, p).catch(err => showToast(err.message));
    }

    function handleLogout() { auth.signOut(); }

    function switchTab(t) {
      document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.id === 'tab' + (t==='cats'?'Cats':'Items')));
      document.querySelectorAll('.tab-content').forEach(el => el.classList.toggle('active', el.id === 'content' + (t==='cats'?'Cats':'Items')));
    }

    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }

    function loadData() {
      db.ref("categories").on('value', s => { window.cats = s.val() || {}; renderCats(); populateSelect(); });
      db.ref("menu_items").on('value', s => { window.items = s.val() || {}; renderItems(); });
    }

    function renderCats() {
      const list = document.getElementById('catsList');
      list.innerHTML = Object.entries(window.cats).map(([k,v]) => `<div class="section-card"><div class="section-header"><span style="color:white;">${v.ar}</span><button class="btn btn-danger" onclick="deleteCat('${k}')">🗑️</button></div></div>`).join('');
    }

    function renderItems() {
      const list = document.getElementById('itemsList');
      list.innerHTML = Object.entries(window.items || {}).map(([k,v]) => `<div class="item-row"><div><strong>${v.en}</strong><br>${v.ar}</div><div style="margin-right:auto;">${v.price} د.ع</div><button class="btn btn-danger" onclick="deleteItem('${k}')">🗑️</button></div>`).join('');
    }

    function populateSelect() {
      const sel = document.getElementById('itemCatSelect');
      sel.innerHTML = '<option value="">-- اختر القسم --</option>' + Object.entries(window.cats).map(([k,v]) => `<option value="${k}">${v.ar}</option>`).join('');
    }

    function openCatModal() { document.getElementById('catOverlay').classList.add('open'); }
    function closeCatModal() { document.getElementById('catOverlay').classList.remove('open'); }
    function openItemModal() { document.getElementById('itemOverlay').classList.add('open'); }
    function closeItemModal() { document.getElementById('itemOverlay').classList.remove('open'); }

    function saveCat() { db.ref("categories").push({ ar: document.getElementById('catArInput').value, en: document.getElementById('catEnInput').value }); closeCatModal(); }
    function saveItem() { db.ref("menu_items").push({ ar: document.getElementById('itemArInput').value, en: document.getElementById('itemEnInput').value, price: document.getElementById('itemPriceInput').value, cat: document.getElementById('itemCatSelect').value }); closeItemModal(); }
    
    function deleteCat(k) { db.ref("categories").child(k).remove(); }
    function deleteItem(k) { db.ref("menu_items").child(k).remove(); }
  </script>
</body>
</html>
